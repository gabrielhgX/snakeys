<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snakeys — Dev Test Client</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0a0a0a; color: #e0e0e0; padding: 24px; }
    h1 { color: #4ade80; margin-bottom: 24px; }
    h2 { color: #86efac; margin: 16px 0 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
    .panel { background: #141414; border: 1px solid #2a2a2a; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    input { background: #1e1e1e; border: 1px solid #333; color: #e0e0e0; padding: 8px 12px; border-radius: 4px; width: 240px; margin-right: 8px; }
    button { background: #16a34a; border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-right: 8px; margin-bottom: 4px; }
    button:hover { background: #15803d; }
    button.danger { background: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    button.secondary { background: #374151; }
    #log { background: #0d0d0d; border: 1px solid #222; border-radius: 4px; padding: 12px; height: 220px; overflow-y: auto; font-size: 12px; }
    .log-entry { margin: 2px 0; }
    .log-entry.ok   { color: #4ade80; }
    .log-entry.err  { color: #f87171; }
    .log-entry.info { color: #60a5fa; }
    .log-entry.warn { color: #fbbf24; }
    #wallet-display { color: #4ade80; font-size: 18px; font-weight: bold; }
    #status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #dc2626; margin-right: 6px; }
    #status-dot.connected { background: #4ade80; }
    canvas { border: 1px solid #333; background: #0d0d0d; display: block; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Snakeys — Dev Test Client</h1>

  <!-- Auth -->
  <div class="panel">
    <h2>Auth</h2>
    <input id="email" placeholder="email" value="test@snakeys.dev">
    <input id="password" type="password" placeholder="password" value="Snakeys2026">
    <br><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <button onclick="verifyEmail()">Verify Email</button>
    <button class="danger" onclick="logout()">Logout</button>
  </div>

  <!-- Wallet -->
  <div class="panel">
    <h2>Wallet  <span id="wallet-display">-</span></h2>
    <button onclick="getWallet()">Refresh Balance</button>
    <button onclick="initiateDeposit()">Deposit R$10</button>
    <button onclick="getTransactions()">Transactions</button>
  </div>

  <!-- Game Server -->
  <div class="panel">
    <h2>Game Server  <span id="status-dot"></span><span id="gs-status">disconnected</span></h2>
    <button onclick="connectGame()">Connect</button>
    <button onclick="joinQueue()">Join Queue</button>
    <button class="danger" onclick="disconnectGame()">Disconnect</button>
    <br><br>
    <canvas id="minimap" width="300" height="300"></canvas>
  </div>

  <!-- Log -->
  <div class="panel">
    <h2>Log</h2>
    <div id="log"></div>
    <br>
    <button class="secondary" onclick="document.getElementById('log').innerHTML=''">Clear</button>
  </div>

  <script>
    const API = 'http://localhost:3001/api';
    const GS  = 'http://localhost:3002';
    let token = localStorage.getItem('snakeys_token') ?? '';
    let verifyToken = '';
    let socket = null;

    function log(msg, type = 'info') {
      const el = document.getElementById('log');
      const div = document.createElement('div');
      div.className = 'log-entry ' + type;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    async function api(method, path, body) {
      try {
        const opts = {
          method,
          headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: `Bearer ${token}` } : {}) },
          ...(body ? { body: JSON.stringify(body) } : {}),
        };
        const res = await fetch(API + path, opts);
        const data = await res.json();
        if (!res.ok) throw new Error(data.message ?? JSON.stringify(data));
        return data;
      } catch (e) {
        log(e.message, 'err');
        throw e;
      }
    }

    async function register() {
      const data = await api('POST', '/auth/register', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      token = data.token;
      verifyToken = data.emailVerificationToken ?? '';
      localStorage.setItem('snakeys_token', token);
      log(`Registered: ${data.user.email}`, 'ok');
      if (verifyToken) log(`Verify token (dev): ${verifyToken.slice(0, 20)}...`, 'warn');
    }

    async function login() {
      const data = await api('POST', '/auth/login', {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      token = data.token;
      localStorage.setItem('snakeys_token', token);
      log(`Logged in: ${data.user.email}`, 'ok');
    }

    async function verifyEmail() {
      if (!verifyToken) { log('No verify token - register first', 'warn'); return; }
      const data = await api('POST', '/auth/verify-email', { token: verifyToken });
      log(data.message, 'ok');
    }

    async function logout() {
      await api('POST', '/auth/logout');
      token = '';
      localStorage.removeItem('snakeys_token');
      log('Logged out', 'ok');
    }

    async function getWallet() {
      const data = await api('GET', '/wallet');
      document.getElementById('wallet-display').textContent =
        `R$ ${parseFloat(data.balanceAvailable).toFixed(2)} available / R$ ${parseFloat(data.balanceLocked).toFixed(2)} locked`;
      log(`Balance: available=${data.balanceAvailable} locked=${data.balanceLocked}`, 'ok');
    }

    async function initiateDeposit() {
      const idempotencyKey = crypto.randomUUID();
      const data = await api('POST', '/wallet/deposit', { amount: 10, idempotencyKey });
      log(`Deposit initiated: txId=${data.transactionId} status=${data.status}`, 'ok');
    }

    async function getTransactions() {
      const data = await api('GET', '/wallet/transactions?limit=5');
      log(`Transactions (last 5): ${JSON.stringify(data.map(t => ({ type: t.type, amount: t.amount, status: t.status })))}`, 'info');
    }

    function connectGame() {
      if (socket?.connected) { log('Already connected', 'warn'); return; }
      socket = io(GS, { auth: { token } });

      socket.on('connect', () => {
        document.getElementById('gs-status').textContent = 'connected';
        document.getElementById('status-dot').className = 'connected';
        log(`Game server connected: ${socket.id}`, 'ok');
      });

      socket.on('disconnect', () => {
        document.getElementById('gs-status').textContent = 'disconnected';
        document.getElementById('status-dot').className = '';
        log('Game server disconnected', 'warn');
      });

      socket.on('queued', d => log(`Queued in room ${d.roomId} - ${d.playerCount} players`, 'ok'));
      socket.on('room_update', d => log(`Room update: ${d.playerCount} players`, 'info'));
      socket.on('match_start', d => { log(`Match started! Room: ${d.roomId}`, 'ok'); startInputCapture(); });
      socket.on('match_end', () => { log('Match ended', 'warn'); stopInputCapture(); });
      socket.on('state', renderMinimap);
      socket.on('error', d => log(`Server error: ${d.message}`, 'err'));
    }

    function joinQueue() {
      if (!socket?.connected) { log('Connect to game server first', 'warn'); return; }
      socket.emit('join_queue');
    }

    function disconnectGame() {
      socket?.disconnect();
      socket = null;
    }

    // Minimap rendering
    function renderMinimap(players) {
      const canvas = document.getElementById('minimap');
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, 300, 300);
      for (const p of players) {
        const x = (p.position.x / 4000) * 300;
        const y = (p.position.y / 4000) * 300;
        const r = Math.max(2, Math.sqrt(p.mass) * 0.5);
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = p.alive ? '#4ade80' : '#444';
        ctx.fill();
      }
    }

    // Mouse direction input
    let inputActive = false;
    function startInputCapture() {
      inputActive = true;
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mousedown', () => socket?.emit('sprint', true));
      document.addEventListener('mouseup',   () => socket?.emit('sprint', false));
    }
    function stopInputCapture() {
      inputActive = false;
      document.removeEventListener('mousemove', onMouseMove);
    }
    function onMouseMove(e) {
      if (!inputActive || !socket?.connected) return;
      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
      socket.emit('direction', { x: e.clientX - cx, y: e.clientY - cy });
    }

    // Auto-restore token
    if (token) log(`Token restored from localStorage: ${token.slice(0, 20)}...`, 'info');
  </script>
</body>
</html>
